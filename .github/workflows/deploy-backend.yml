name: Backend — CI & Railway Deploy

on:
  push:
    branches:
      - main
      - development
    paths:
      - "zafora-backend/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches:
      - main
      - development
    paths:
      - "zafora-backend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

# Cancel any in-progress run for the same branch
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # CI — runs on every push & PR
  # ─────────────────────────────────────────────
  ci:
    name: CI — Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zafora-backend/package-lock.json

      - name: Install dependencies
        working-directory: zafora-backend
        run: npm install --legacy-peer-deps --include=dev

      - name: Typecheck
        working-directory: zafora-backend
        run: npm run typecheck

      - name: Build
        working-directory: zafora-backend
        run: npm run build

  # ─────────────────────────────────────────────
  # Deploy to DEV — only on push to `development`
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Railway (zafora-dev)
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.ref == 'refs/heads/development' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    environment:
      name: development
      url: ${{ vars.DEV_BACKEND_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway (zafora-dev service)
        working-directory: zafora-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway up \
            --service "zafora-dev" \
            --environment production \
            --detach

      - name: Post deployment comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '✅ **Backend → Railway Dev** deployed for `' + sha + '`',
                '',
                '🔗 API: ${{ vars.DEV_BACKEND_URL }}',
                '📋 Swagger: ${{ vars.DEV_BACKEND_URL }}/api/docs',
              ].join('\n')
            });

  # ─────────────────────────────────────────────
  # Deploy to PROD — only on push to `main`
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Railway (zafora-production)
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.PROD_BACKEND_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway (zafora-production service)
        working-directory: zafora-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway up \
            --service "zafora-production" \
            --environment production \
            --detach

      - name: Post deployment comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '🚀 **Backend → Railway Production** deployed for `' + sha + '`',
                '',
                '🌐 API: ${{ vars.PROD_BACKEND_URL }}',
                '📋 Swagger: ${{ vars.PROD_BACKEND_URL }}/api/docs',
              ].join('\n')
            });
