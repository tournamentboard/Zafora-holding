name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
      - development
    paths:
      - "zafora-frontend/**"
      - ".github/workflows/deploy.yml"

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: team_ceJmWvI4IH0uwZCJmOhRajyS
  VERCEL_PROJECT_ID: prj_4FIOg5EecM7QdNSNy3y1pTlu9URk

jobs:
  deploy-development:
    name: Deploy to Development (Vercel Preview)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    environment:
      name: development
      url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zafora-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (Preview)
        working-directory: zafora-frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project (Preview)
        working-directory: zafora-frontend
        env:
          NEXT_PUBLIC_BASE_URL: https://dev.zafora-holding.com
          NEXT_PUBLIC_API_URL: https://dev-api.zafora-holding.com
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy
        working-directory: zafora-frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Post deployment URL as commit comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.sha.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ **Development deployment** for \`${sha}\`\n\n🔗 Preview URL: ${url}`
            });

  deploy-production:
    name: Deploy to Production (Vercel)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zafora-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (Production)
        working-directory: zafora-frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project (Production)
        working-directory: zafora-frontend
        env:
          NEXT_PUBLIC_BASE_URL: https://zafora-holding.com
          NEXT_PUBLIC_API_URL: https://api.zafora-holding.com
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy
        working-directory: zafora-frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "production_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Post deployment URL as commit comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const url = '${{ steps.deploy.outputs.production_url }}';
            const sha = context.sha.substring(0, 7);
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Production deployment** for \`${sha}\`\n\n🌐 Live URL: ${url}`
            });
