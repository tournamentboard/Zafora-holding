name: Frontend — CI & Vercel Deploy

on:
  push:
    branches:
      - main
      - development
    paths:
      - "zafora-frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  pull_request:
    branches:
      - main
      - development
    paths:
      - "zafora-frontend/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "development"
        type: choice
        options:
          - development
          - production

# Cancel any in-progress run for the same branch
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # CI — runs on every push & PR
  # ─────────────────────────────────────────────
  ci:
    name: CI — Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zafora-frontend/package-lock.json

      - name: Install dependencies
        working-directory: zafora-frontend
        run: npm install

      - name: Typecheck
        working-directory: zafora-frontend
        run: npm run typecheck

  # ─────────────────────────────────────────────
  # Deploy to DEV — only on push to `development`
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Vercel (Preview / Development)
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.ref == 'refs/heads/development' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    permissions:
      contents: write
    environment:
      name: development
      url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zafora-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Write Vercel project config
        working-directory: zafora-frontend
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            "${{ secrets.VERCEL_ORG_ID }}" > .vercel/project.json

      - name: Pull Vercel environment (preview)
        working-directory: zafora-frontend
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        working-directory: zafora-frontend
        run: npm ci

      - name: Build (Development)
        working-directory: zafora-frontend
        run: |
          node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('vercel.json'));c.installCommand='';fs.writeFileSync('vercel.json',JSON.stringify(c,null,2));"
          vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel (Preview)
        id: deploy
        working-directory: zafora-frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Post deployment comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const sha = context.sha.substring(0, 7);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '✅ **Frontend → Vercel Development** deployed for `' + sha + '`',
                '',
                '🔗 Preview URL: ' + url,
              ].join('\n')
            });

  # ─────────────────────────────────────────────
  # Deploy to PROD — only on push to `main`
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Vercel (Production)
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    permissions:
      contents: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.production_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: zafora-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Write Vercel project config
        working-directory: zafora-frontend
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "${{ secrets.VERCEL_PROJECT_ID }}" \
            "${{ secrets.VERCEL_ORG_ID }}" > .vercel/project.json

      - name: Pull Vercel environment (production)
        working-directory: zafora-frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        working-directory: zafora-frontend
        run: npm ci

      - name: Build (Production)
        working-directory: zafora-frontend
        run: |
          node -e "const fs=require('fs');const c=JSON.parse(fs.readFileSync('vercel.json'));c.installCommand='';fs.writeFileSync('vercel.json',JSON.stringify(c,null,2));"
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to Vercel (Production)
        id: deploy
        working-directory: zafora-frontend
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "production_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Post deployment comment
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const url = '${{ steps.deploy.outputs.production_url }}';
            const sha = context.sha.substring(0, 7);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                '🚀 **Frontend → Vercel Production** deployed for `' + sha + '`',
                '',
                '🌐 Live URL: ' + url,
              ].join('\n')
            });
