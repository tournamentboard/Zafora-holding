openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Zafora Holding API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead / consultation request operations
  - name: projects
    description: Project pipeline operations
  - name: interests
    description: Project interest operations
  - name: documents
    description: Document management operations
  - name: stats
    description: Analytics and statistics
  - name: services
    description: Consulting services
  - name: content
    description: Editable site content (stats, methodology, settings)
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: requestType
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  leads:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lead"
                  total:
                    type: integer
                required: [leads, total]
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit consultation request or lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: sector
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                  total:
                    type: integer
                required: [projects, total]
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/interests:
    get:
      operationId: listProjectInterests
      tags: [interests]
      summary: List interests for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of interests
          content:
            application/json:
              schema:
                type: object
                properties:
                  interests:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectInterest"
                required: [interests]
    post:
      operationId: expressInterest
      tags: [interests]
      summary: Express interest in a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpressInterestBody"
      responses:
        "201":
          description: Interest recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectInterest"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: visibility
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  total:
                    type: integer
                required: [documents, total]
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload a document (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Document updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/projects:
    get:
      operationId: getProjectStats
      tags: [stats]
      summary: Get project statistics by sector
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  bySector:
                    type: array
                    items:
                      $ref: "#/components/schemas/SectorStat"
                  byStatus:
                    type: array
                    items:
                      $ref: "#/components/schemas/StatusStat"
                required: [bySector, byStatus]

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all consulting services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      $ref: "#/components/schemas/Service"
                required: [services]
    post:
      operationId: createService
      tags: [services]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceBody"
      responses:
        "201":
          description: Service created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceBody"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /content/stats:
    get:
      operationId: listContentStats
      tags: [content]
      summary: List editable site stats
      responses:
        "200":
          description: List of stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContentStat"
                required: [stats]
    post:
      operationId: createContentStat
      tags: [content]
      summary: Create a content stat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContentStatBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentStat"

  /content/stats/{id}:
    patch:
      operationId: updateContentStat
      tags: [content]
      summary: Update a content stat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContentStatBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentStat"
    delete:
      operationId: deleteContentStat
      tags: [content]
      summary: Delete a content stat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /content/methodology:
    get:
      operationId: listMethodologySteps
      tags: [content]
      summary: List methodology steps
      responses:
        "200":
          description: List of steps
          content:
            application/json:
              schema:
                type: object
                properties:
                  steps:
                    type: array
                    items:
                      $ref: "#/components/schemas/MethodologyStep"
                required: [steps]
    post:
      operationId: createMethodologyStep
      tags: [content]
      summary: Create a methodology step
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMethodologyStepBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MethodologyStep"

  /content/methodology/{id}:
    patch:
      operationId: updateMethodologyStep
      tags: [content]
      summary: Update a methodology step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMethodologyStepBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MethodologyStep"
    delete:
      operationId: deleteMethodologyStep
      tags: [content]
      summary: Delete a methodology step
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /content/settings/{key}:
    get:
      operationId: getSiteSettings
      tags: [content]
      summary: Get site settings by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Settings value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSetting"
    patch:
      operationId: updateSiteSettings
      tags: [content]
      summary: Update site settings by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required: [value]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSetting"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Lead:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        organization:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        country:
          type: string
        requestType:
          type: string
        projectSector:
          type: string
          nullable: true
        message:
          type: string
        budgetFundingNeed:
          type: string
          nullable: true
        projectTimeline:
          type: string
          nullable: true
        roleType:
          type: string
          nullable: true
        status:
          type: string
        notes:
          type: string
          nullable: true
        followUpDate:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, fullName, organization, email, country, requestType, message, status, createdAt]

    CreateLeadBody:
      type: object
      properties:
        fullName:
          type: string
        organization:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        country:
          type: string
        requestType:
          type: string
        projectSector:
          type: string
          nullable: true
        message:
          type: string
        budgetFundingNeed:
          type: string
          nullable: true
        projectTimeline:
          type: string
          nullable: true
        roleType:
          type: string
          nullable: true
      required: [fullName, organization, email, country, requestType, message]

    UpdateLeadBody:
      type: object
      properties:
        status:
          type: string
        notes:
          type: string
          nullable: true
        followUpDate:
          type: string
          nullable: true

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sector:
          type: string
        country:
          type: string
        region:
          type: string
          nullable: true
        fundingStatus:
          type: string
        estimatedValue:
          type: string
        zaforaRole:
          type: string
        partnerNeed:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        interestCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, sector, country, fundingStatus, estimatedValue, zaforaRole, interestCount, createdAt]

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        sector:
          type: string
        country:
          type: string
        region:
          type: string
          nullable: true
        fundingStatus:
          type: string
        estimatedValue:
          type: string
        zaforaRole:
          type: string
        partnerNeed:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
      required: [name, sector, country, fundingStatus, estimatedValue, zaforaRole]

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        sector:
          type: string
        country:
          type: string
        region:
          type: string
          nullable: true
        fundingStatus:
          type: string
        estimatedValue:
          type: string
        zaforaRole:
          type: string
        partnerNeed:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true

    ProjectInterest:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        fullName:
          type: string
        organization:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        roleType:
          type: string
        message:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, projectId, fullName, organization, email, roleType, createdAt]

    ExpressInterestBody:
      type: object
      properties:
        fullName:
          type: string
        organization:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        roleType:
          type: string
        message:
          type: string
          nullable: true
      required: [fullName, organization, email, roleType]

    Document:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        documentType:
          type: string
        visibility:
          type: string
        fileUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, title, documentType, visibility, createdAt]

    CreateDocumentBody:
      type: object
      properties:
        title:
          type: string
        documentType:
          type: string
        visibility:
          type: string
        fileUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
      required: [title, documentType, visibility]

    UpdateDocumentBody:
      type: object
      properties:
        title:
          type: string
        documentType:
          type: string
        visibility:
          type: string
        fileUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    Service:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        description:
          type: string
        bullets:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean
      required: [id, name, icon, description, bullets, displayOrder, visible]

    CreateServiceBody:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        description:
          type: string
        bullets:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean
      required: [name, description, bullets]

    UpdateServiceBody:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string
        description:
          type: string
        bullets:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean

    ContentStat:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        value:
          type: string
        suffix:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        iconName:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean
      required: [id, label, value, displayOrder, visible]

    CreateContentStatBody:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        suffix:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        iconName:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean
      required: [label, value]

    UpdateContentStatBody:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        suffix:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        iconName:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean

    MethodologyStep:
      type: object
      properties:
        id:
          type: integer
        stepNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        iconName:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean
      required: [id, stepNumber, title, description, displayOrder, visible]

    CreateMethodologyStepBody:
      type: object
      properties:
        stepNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        iconName:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean
      required: [stepNumber, title, description]

    UpdateMethodologyStepBody:
      type: object
      properties:
        stepNumber:
          type: integer
        title:
          type: string
        description:
          type: string
        iconName:
          type: string
          nullable: true
        displayOrder:
          type: integer
        visible:
          type: boolean

    SiteSetting:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        value:
          type: string
        updatedAt:
          type: string
      required: [id, key, value, updatedAt]

    DashboardStats:
      type: object
      properties:
        totalLeads:
          type: integer
        totalProjects:
          type: integer
        totalInterests:
          type: integer
        totalDocuments:
          type: integer
        newLeadsThisMonth:
          type: integer
        activeProjects:
          type: integer
        leadsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusStat"
        recentLeads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
      required: [totalLeads, totalProjects, totalInterests, totalDocuments, newLeadsThisMonth, activeProjects, leadsByStatus, recentLeads]

    SectorStat:
      type: object
      properties:
        sector:
          type: string
        count:
          type: integer
        totalValue:
          type: string
      required: [sector, count, totalValue]

    StatusStat:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required: [status, count]

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path. Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
